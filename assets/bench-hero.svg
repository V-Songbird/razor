<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .title{fill:#1f2937;font-size:19px;font-weight:700}
    .sub{fill:#6b7280;font-size:13px}
    .lab{fill:#4b5563;font-size:13.5px}
    .rzlab{fill:#15803d;font-size:14px;font-weight:700}
    .val{fill:#374151;font-size:14px;font-weight:600}
    .rzval{fill:#15803d;font-size:15px;font-weight:700}
    .track{fill:#eef2f6}
    .bad{fill:#e0653f}
    .rz{fill:#16a34a}
    .foot{fill:#6b7280;font-size:12.5px}
    .em{fill:#15803d;font-weight:700}
    .badge{fill:#16a34a}
    @media (prefers-color-scheme:dark){
      .title{fill:#e6edf3}.sub{fill:#9198a1}.lab{fill:#b0b8c0}.rzlab{fill:#3fb950}
      .val{fill:#c9d1d9}.rzval{fill:#3fb950}.track{fill:#1c2128}
      .bad{fill:#e0653f}.rz{fill:#3fb950}.foot{fill:#9198a1}.em{fill:#3fb950}.badge{fill:#238636}
    }
  </style>
  <text x="16" y="30" class="title">You said &#8220;just use axios.&#8221; Did the needless dependency ship?</text>
  <text x="16" y="52" class="sub">Share of sessions that added the library instead of the built-in</text>

  <rect x="588" y="12" width="124" height="34" rx="17" class="badge"/>
  <text x="650" y="35" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">razor: 0%</text>

  <text x="16" y="97" class="lab">no plugin</text>
  <rect x="185" y="80" width="380" height="30" rx="15" class="track"/>
  <rect x="185" y="80" width="380" height="30" rx="15" class="bad"/>
  <text x="575" y="100" class="val">100%</text>

  <text x="16" y="143" class="lab">a &#8220;keep it lean&#8221; plugin</text>
  <rect x="185" y="126" width="380" height="30" rx="15" class="track"/>
  <rect x="185" y="126" width="350" height="30" rx="15" class="bad"/>
  <text x="575" y="146" class="val">92%</text>

  <text x="16" y="189" class="rzlab">razor</text>
  <rect x="185" y="172" width="380" height="30" rx="15" class="track"/>
  <rect x="185" y="172" width="6" height="30" rx="3" class="rz"/>
  <text x="575" y="192" class="rzval">0%</text>

  <text x="16" y="235" class="foot">With no plugin it shipped <tspan class="em">every time</tspan>; razor reached for the platform&#8217;s built-in instead &#8212; <tspan class="em">every time</tspan>.</text>
</svg>
