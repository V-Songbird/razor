<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .title{fill:#1f2937;font-size:19px;font-weight:700}
    .sub{fill:#6b7280;font-size:13px}
    .lab{fill:#4b5563;font-size:13.5px}
    .rzlab{fill:#15803d;font-size:14px;font-weight:700}
    .val{fill:#374151;font-size:14px;font-weight:600}
    .rzval{fill:#15803d;font-size:15px;font-weight:700}
    .track{fill:#eef2f6}
    .base{fill:#cbd5e1}
    .lean{fill:#94a3b8}
    .rz{fill:#16a34a}
    .foot{fill:#6b7280;font-size:12.5px}
    .em{fill:#15803d;font-weight:700}
    .badge{fill:#16a34a}
    @media (prefers-color-scheme:dark){
      .title{fill:#e6edf3}.sub{fill:#9198a1}.lab{fill:#b0b8c0}.rzlab{fill:#3fb950}
      .val{fill:#c9d1d9}.rzval{fill:#3fb950}.track{fill:#1c2128}.base{fill:#444c56}
      .lean{fill:#768390}.rz{fill:#3fb950}.foot{fill:#9198a1}.em{fill:#3fb950}.badge{fill:#238636}
    }
  </style>
  <text x="16" y="30" class="title">Given room to trim, how much code got written?</text>
  <text x="16" y="52" class="sub">A parse-the-query-string task a built-in already covers &#8212; lines the agent left behind</text>

  <rect x="576" y="12" width="136" height="34" rx="17" class="badge"/>
  <text x="644" y="35" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">84% leaner</text>

  <text x="16" y="97" class="lab">no plugin</text>
  <rect x="185" y="80" width="380" height="30" rx="15" class="track"/>
  <rect x="185" y="80" width="380" height="30" rx="15" class="base"/>
  <text x="575" y="100" class="val">19 lines</text>

  <text x="16" y="143" class="lab">a &#8220;keep it lean&#8221; plugin</text>
  <rect x="185" y="126" width="380" height="30" rx="15" class="track"/>
  <rect x="185" y="126" width="80" height="30" rx="15" class="lean"/>
  <text x="575" y="146" class="val">4 lines</text>

  <text x="16" y="189" class="rzlab">razor</text>
  <rect x="185" y="172" width="380" height="30" rx="15" class="track"/>
  <rect x="185" y="172" width="60" height="30" rx="15" class="rz"/>
  <text x="575" y="192" class="rzval">3 lines</text>

  <text x="16" y="235" class="foot">The built-in did the job in a few lines; razor reached for it instead of <tspan class="em">hand-rolling a parser</tspan>.</text>
</svg>
