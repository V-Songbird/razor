name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: run tests (no-op if this plugin has no tests/ directory)
        run: |
          if [ -d tests ]; then
            node --test tests/*.test.js
          else
            echo "no tests/ directory, nothing to run"
          fi
